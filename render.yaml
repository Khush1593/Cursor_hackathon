# Render Blueprint — Aura (FREE-tier friendly)
#
# Important Render free-plan limits:
# - Private services (type: pserv) are NOT allowed on free → Python is a public web service
# - Free web services cannot RECEIVE private-network traffic → use public https://*.onrender.com URLs
#
# Push to GitHub → Dashboard → New → Blueprint → this repo / render.yaml

databases:
  - name: aura-db
    plan: free
    databaseName: aura_db
    user: aura_user

services:
  # ── Python AI (public web — free plan cannot use pserv) ─
  - type: web
    name: aura-python
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Python/Dockerfile
    dockerContext: ./Python
    healthCheckPath: /health
    # Render injects PORT (often 10000)
    dockerCommand: sh -c "uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gemini-2.5-flash
      # Use stub=1 if you have no Gemini key yet (service will still boot)
      - key: USE_AI_STUB
        value: "0"
      - key: LLM_TIMEOUT_SECONDS
        value: "45"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2

  # ── NestJS API ─────────────────────────────────────────
  - type: web
    name: aura-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      # Set AFTER frontend URL exists, e.g. https://aura-frontend.onrender.com
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString
      # Free tier: must use PUBLIC URL (not private hostname)
      - key: PYTHON_SERVICE_URL
        value: https://aura-python.onrender.com
      - key: PYTHON_SERVICE_TIMEOUT_MS
        value: "50000"
      - key: USE_AI_STUB
        value: "false"
      - key: EXA_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: TRIAGE_BUDGET_PER_HOUR
        value: "60"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        value: Aura <noreply@aura.health>
      - key: MAIL_DEV_EXPOSE_TOKEN
        value: "false"

  # ── Next.js UI ─────────────────────────────────────────
  - type: web
    name: aura-frontend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Frontend/Dockerfile
    dockerContext: ./Frontend
    healthCheckPath: /
    envVars:
      - key: HOSTNAME
        value: "0.0.0.0"
      # Free tier: Next rewrite must hit Nest PUBLIC URL (build arg via envVars)
      - key: NEXT_PUBLIC_API_URL
        value: https://aura-backend.onrender.com
      - key: NEXT_PUBLIC_USE_MOCK
        value: "0"
