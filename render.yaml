# Render Blueprint — Aura monorepo (replaces docker-compose on Render)
#
# Render does NOT import docker-compose.yml directly.
# Push this file to GitHub, then: Dashboard → New → Blueprint → select this repo.
#
# Docs: https://render.com/docs/infrastructure-as-code

databases:
  - name: aura-db
    plan: free
    databaseName: aura_db
    user: aura_user

services:
  # ── Python AI (private — only Nest calls it) ───────────
  - type: pserv
    name: aura-python
    runtime: docker
    plan: free
    dockerfilePath: ./Python/Dockerfile
    dockerContext: ./Python
    # Render sets PORT (usually 10000); bind to it so Nest can reach this service
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gemini-2.5-flash
      - key: USE_AI_STUB
        value: "0"
      - key: LLM_TIMEOUT_SECONDS
        value: "45"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2

  # ── NestJS API (public HTTPS) ──────────────────────────
  - type: web
    name: aura-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      # After first deploy, set this to your frontend public URL, e.g.
      # https://aura-frontend.onrender.com
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString
      # Private service DNS on Render: http://<service-name>:<PORT>
      # Default Docker PORT on Render is 10000
      - key: PYTHON_SERVICE_URL
        value: http://aura-python:10000
      - key: PYTHON_SERVICE_TIMEOUT_MS
        value: "50000"
      - key: USE_AI_STUB
        value: "false"
      - key: EXA_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: TRIAGE_BUDGET_PER_HOUR
        value: "60"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        value: Aura <noreply@aura.health>
      - key: MAIL_DEV_EXPOSE_TOKEN
        value: "false"

  # ── Next.js UI (public HTTPS) ──────────────────────────
  - type: web
    name: aura-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./Frontend/Dockerfile
    dockerContext: ./Frontend
    # Build-time: Next rewrite target must reach Nest inside Render's private network
    dockerBuildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: http://aura-backend:10000
      - key: NEXT_PUBLIC_USE_MOCK
        value: "0"
    envVars:
      - key: HOSTNAME
        value: "0.0.0.0"
